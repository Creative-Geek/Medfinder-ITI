<!-- Admin Sidebar (shared partial) -->
<aside class="admin-sidebar">
  <!-- Logo -->
  <div class="admin-sidebar__logo">
    <img src="assets/logos/logo.svg" alt="MedFinder" />
    <div>
      <div class="admin-sidebar__logo-text">MedFinder</div>
      <div class="admin-sidebar__logo-sub">لوحة التحكم</div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="admin-sidebar__nav">
    <a
      href="#!/admin"
      class="admin-sidebar__link"
      ng-class="{'admin-sidebar__link--active': activePage === 'dashboard'}"
    >
      <i data-lucide="layout-dashboard"></i>
      نظرة عامة
    </a>
    <a
      href="#!/admin/products"
      class="admin-sidebar__link"
      ng-class="{'admin-sidebar__link--active': activePage === 'products'}"
    >
      <i data-lucide="package"></i>
      المنتجات
    </a>
    <a
      href="#!/admin/orders"
      class="admin-sidebar__link"
      ng-class="{'admin-sidebar__link--active': activePage === 'orders'}"
    >
      <i data-lucide="shopping-bag"></i>
      الطلبات
    </a>
    <a
      href="#!/admin/customers"
      class="admin-sidebar__link"
      ng-class="{'admin-sidebar__link--active': activePage === 'customers'}"
    >
      <i data-lucide="users"></i>
      العملاء
    </a>
  </nav>

  <!-- Footer -->
  <div class="admin-sidebar__footer">
    <div class="admin-sidebar__user">
      <div class="admin-sidebar__user-avatar" id="sidebar-admin-avatar">A</div>
      <div class="admin-sidebar__user-info">
        <div class="admin-sidebar__user-name" id="sidebar-admin-name">
          المدير
        </div>
        <div class="admin-sidebar__user-role">مسؤول النظام</div>
      </div>
    </div>
    <a href="#!/" class="admin-sidebar__link admin-sidebar__link--exit">
      <i data-lucide="arrow-right"></i>
      العودة للمتجر
    </a>
  </div>
</aside>

<script>
  setTimeout(function () {
    try {
      var userStr = localStorage.getItem("sb_user");
      var user = userStr ? JSON.parse(userStr) : null;
      var name = (user && (user.full_name || user.email)) || "المدير";
      var letter = name.charAt(0).toUpperCase();
      document.getElementById("sidebar-admin-name").textContent = name;
      document.getElementById("sidebar-admin-avatar").textContent = letter;
    } catch (e) {}
  }, 100);
</script>
