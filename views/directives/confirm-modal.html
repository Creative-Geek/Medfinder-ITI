<!-- Confirm modal template -->
<!-- Used via: <confirm-modal show="showDeleteModal" title="Delete Product" message="Are you sure?" on-confirm="deleteProduct()" on-cancel="cancelDelete()"></confirm-modal> -->
<div class="modal-overlay" ng-show="show" ng-click="cancel()">
  <div class="modal-dialog" ng-click="$event.stopPropagation()">
    <h3 class="modal-dialog__title">{{ title }}</h3>
    <p class="modal-dialog__message">{{ message }}</p>
    <div class="modal-dialog__actions">
      <button class="btn btn--secondary" ng-click="cancel()">Cancel</button>
      <button class="btn btn--danger" ng-click="confirm()">Confirm</button>
    </div>
  </div>
</div>
