<!-- Product Card Template -->
<div
  class="uk-card product-card overflow-hidden flex flex-col h-full group"
  ng-class="{ 'opacity-50': isOutOfStock() }"
>
  <!-- Image + Wishlist -->
  <div class="relative overflow-hidden">
    <a ng-href="#!/product/{{ product.id }}" class="block">
      <div
        class="product-card-image flex items-center justify-center p-4 bg-white"
        style="height: 180px"
      >
        <img
          ng-src="{{ product.image_url }}"
          alt="{{ product.name_ar }}"
          class="max-h-full max-w-full object-contain transition-transform duration-300 group-hover:scale-105"
          loading="lazy"
          ng-on-error="fallbackImage()"
        />
      </div>
    </a>
    <button
      class="absolute top-2 left-2 w-8 h-8 rounded-full bg-white/90 shadow-sm flex items-center justify-center hover:bg-white hover:scale-110 transition-all z-10"
      ng-click="$event.preventDefault(); $event.stopPropagation(); handleToggleWishlist()"
      aria-label="Toggle wishlist"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        ng-attr-fill="{{ isWishlisted() ? '#ef4444' : 'none' }}"
        ng-attr-stroke="{{ isWishlisted() ? '#ef4444' : '#9ca3af' }}"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        style="transition: all 0.2s"
      >
        <path
          d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
        />
      </svg>
    </button>
  </div>

  <!-- Info -->
  <div class="p-3 flex flex-col flex-1 gap-1">
    <a
      ng-href="#!/product/{{ product.id }}"
      class="text-sm font-semibold leading-tight line-clamp-2 min-h-[2.5rem] text-foreground hover:text-primary transition-colors no-underline"
    >
      {{ product.name_ar }}
    </a>
    <p class="text-xs text-muted-foreground">{{ getSubtitle() }}</p>
    <p class="text-base font-bold text-primary mt-auto">
      {{ product.price }} جنيه
    </p>
  </div>

  <!-- Add to Cart / Qty Stepper -->
  <div class="px-3 pb-3">
    <!-- "Add to Cart" button (shown when NOT in cart) -->
    <button
      ng-if="!isInCart() && !isOutOfStock()"
      ng-click="handleAddToCart()"
      class="w-full py-2 rounded-lg text-sm font-semibold transition-all bg-accent text-white hover:bg-accent/90 hover:shadow-md"
    >
      <span class="flex items-center justify-center gap-1">
        <i data-lucide="shopping-cart" class="h-3.5 w-3.5"></i>
        أضف إلى العربة
      </span>
    </button>

    <!-- Qty stepper (shown when in cart) -->
    <quantity-stepper
      ng-if="isInCart()"
      qty="cartQty"
      max="product.stock"
      on-change="onStepperChange(qty)"
      on-remove="onStepperRemove()"
    ></quantity-stepper>

    <!-- Out of stock -->
    <button
      ng-if="isOutOfStock()"
      disabled
      class="w-full py-2 rounded-lg text-sm font-semibold bg-gray-200 text-gray-500 cursor-not-allowed"
    >
      غير متوفر
    </button>
  </div>
</div>
