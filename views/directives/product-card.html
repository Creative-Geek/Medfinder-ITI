<!-- Product Card Template -->
<div
  class="uk-card product-card overflow-hidden flex flex-col h-full group"
  ng-class="{ 'opacity-50 pointer-events-none': isOutOfStock() }"
>
  <!-- Image + Wishlist -->
  <div class="relative overflow-hidden">
    <a ng-href="#!/product/{{ product.id }}" class="block">
      <div
        class="product-card-image flex items-center justify-center p-4 bg-white"
        style="height: 180px"
      >
        <img
          ng-src="{{ product.image_url }}"
          alt="{{ product.name_ar }}"
          class="max-h-full max-w-full object-contain transition-transform duration-300 group-hover:scale-105"
          loading="lazy"
          ng-on-error="fallbackImage()"
        />
      </div>
    </a>
    <button
      class="absolute top-2 left-2 w-8 h-8 rounded-full bg-white/90 shadow-sm flex items-center justify-center hover:bg-white hover:scale-110 transition-all z-10"
      ng-click="onToggleWishlist({ product: product })"
      aria-label="Toggle wishlist"
    >
      <i
        data-lucide="heart"
        class="h-4 w-4 text-gray-400 hover:text-red-500"
      ></i>
    </button>
  </div>

  <!-- Info -->
  <div class="p-3 flex flex-col flex-1 gap-1">
    <a
      ng-href="#!/product/{{ product.id }}"
      class="text-sm font-semibold leading-tight line-clamp-2 min-h-[2.5rem] text-foreground hover:text-primary transition-colors no-underline"
    >
      {{ product.name_ar }}
    </a>
    <p class="text-xs text-muted-foreground">{{ getSubtitle() }}</p>
    <p class="text-base font-bold text-primary mt-auto">
      {{ product.price }} جنيه
    </p>
  </div>

  <!-- Add to Cart -->
  <div class="px-3 pb-3">
    <button
      ng-click="onAddToCart({ product: product })"
      ng-disabled="isOutOfStock()"
      class="w-full py-2 rounded-lg text-sm font-semibold transition-all"
      ng-class="{
        'bg-accent text-white hover:bg-accent/90 hover:shadow-md': !isOutOfStock(),
        'bg-gray-200 text-gray-500 cursor-not-allowed': isOutOfStock()
      }"
    >
      <span
        ng-if="!isOutOfStock()"
        class="flex items-center justify-center gap-1"
      >
        <i data-lucide="shopping-cart" class="h-3.5 w-3.5"></i>
        أضف إلى العربة
      </span>
      <span ng-if="isOutOfStock()">غير متوفر</span>
    </button>
  </div>
</div>
