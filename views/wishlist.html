<!-- Wishlist Page -->
<div class="uk-container py-8">
  <!-- Header -->
  <div class="flex items-center gap-3 mb-6" data-reveal>
    <i
      data-lucide="heart"
      class="h-7 w-7 text-red-500"
      style="color: #ef4444"
    ></i>
    <h1 class="text-2xl font-bold text-dark">المفضلة</h1>
    <span ng-if="products.length" class="text-sm text-muted-foreground"
      >({{ products.length }} منتجات)</span
    >
  </div>

  <!-- Loading -->
  <div ng-if="loading" class="shop-product-grid">
    <div ng-repeat="i in [1,2,3,4]" class="skeleton-card">
      <div class="skeleton-card__image animate-pulse"></div>
      <div class="skeleton-card__body">
        <div class="skeleton-line skeleton-line--long animate-pulse"></div>
        <div class="skeleton-line skeleton-line--short animate-pulse"></div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div ng-if="!loading && products.length === 0" class="shop-empty" data-reveal>
    <i data-lucide="heart" class="h-16 w-16 mb-4" style="color: #9ca3af"></i>
    <h3 class="text-lg font-bold text-dark mb-2">لا توجد منتجات في المفضلة</h3>
    <p class="text-sm text-muted-foreground mb-4">
      تصفح المنتجات واضغط على القلب لإضافتها هنا
    </p>
    <a href="#!/shop" class="btn btn--primary"> تصفح المنتجات </a>
  </div>

  <!-- Product grid -->
  <div ng-if="!loading && products.length" class="shop-product-grid">
    <div ng-repeat="product in products track by product.id" data-reveal>
      <product-card
        product="product"
        on-add-to-cart="addToCart(product)"
      ></product-card>
    </div>
  </div>
</div>
