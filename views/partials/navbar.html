<!-- Medfinder Navbar: Header + Category Bar -->
<header class="bg-white border-b border-gray-100 shadow-sm">
  <!-- Main Header Row -->
  <div class="uk-container py-3">
    <div class="flex items-center gap-4">
      <!-- Logo (right side in RTL) -->
      <a href="#!/" class="shrink-0 flex items-center gap-2">
        <img src="assets/logos/logo.svg" alt="Medfinder" class="h-9 w-9" />
        <span class="text-xl font-bold text-dark hidden sm:inline"
          >Medfinder</span
        >
      </a>

      <!-- Search Bar (center, dominant) -->
      <div class="flex-1 mx-auto relative navbar-search-wrapper">
        <input
          type="text"
          placeholder="ما الذي تبحث عنه؟"
          class="uk-input w-full pr-4 pl-10 py-2 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 font-cairo text-sm"
          ng-model="$root.searchQuery"
          ng-change="$root.onSearchInput()"
          ng-keydown="$event.keyCode === 13 && $root.doSearch(); $event.keyCode === 27 && $root.closeSearchDropdown()"
          ng-focus="$root.onSearchInput()"
          autocomplete="off"
        />
        <i
          data-lucide="search"
          class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400"
        ></i>

        <!-- Live Search Dropdown -->
        <div ng-if="$root.searchDropdownOpen" class="navbar-search-dropdown">
          <!-- Results -->
          <a
            ng-repeat="item in $root.searchResults track by item.id"
            ng-click="$root.goToProduct(item.id)"
            class="navbar-sd-item"
          >
            <div class="navbar-sd-img">
              <img ng-src="{{ item.image_url }}" alt="{{ item.name_ar }}" />
            </div>
            <div class="navbar-sd-info">
              <div
                class="navbar-sd-name"
                ng-bind-html="item.name_ar | highlight:$root.searchQuery"
              ></div>
              <div class="navbar-sd-meta">
                {{ item.brand || '' }}
                <span ng-if="item.brand"> · </span>
                {{ item.price }} جنيه
              </div>
            </div>
          </a>

          <!-- No results -->
          <div ng-if="$root.searchResults.length === 0" class="navbar-sd-empty">
            لا توجد نتائج لـ "{{ $root.searchQuery }}"
          </div>

          <!-- See all results -->
          <a
            ng-if="$root.searchResults.length > 0"
            ng-click="$root.doSearch()"
            class="navbar-sd-all"
          >
            <i data-lucide="search" class="h-3.5 w-3.5"></i>
            عرض جميع النتائج لـ "{{ $root.searchQuery }}"
          </a>
        </div>
      </div>

      <!-- Action Icons (left side in RTL) -->
      <div class="flex items-center gap-1 shrink-0">
        <!-- Wishlist -->
        <a
          href="#!/wishlist"
          class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors text-gray-600 hover:text-primary no-underline relative"
        >
          <i data-lucide="heart" class="h-5 w-5"></i>
          <span class="text-xs hidden md:inline">المفضلة</span>
          <span
            ng-if="$root.wishlistCount > 0"
            class="absolute -top-1 -left-1 bg-accent text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold"
            >{{ $root.wishlistCount }}</span
          >
        </a>

        <!-- Cart -->
        <a
          href="#!/cart"
          class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors text-gray-600 hover:text-primary no-underline relative"
        >
          <i data-lucide="shopping-cart" class="h-5 w-5"></i>
          <span class="text-xs hidden md:inline">العربة</span>
          <span
            ng-if="$root.cartCount > 0"
            class="absolute -top-1 -left-1 bg-accent text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold"
            >{{ $root.cartCount }}</span
          >
        </a>

        <!-- Account -->
        <!-- Guest: direct link to login -->
        <a
          ng-if="!$root.isLoggedIn"
          href="#!/login"
          class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors text-gray-600 hover:text-primary no-underline"
        >
          <i data-lucide="user" class="h-5 w-5"></i>
          <span class="text-xs hidden md:inline">حسابي</span>
        </a>

        <!-- Logged in: dropdown -->
        <div ng-if="$root.isLoggedIn" class="account-dropdown">
          <button
            class="flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors text-gray-600 hover:text-primary account-dropdown__trigger"
          >
            <span class="account-dropdown__trigger-icons">
              <i data-lucide="user" class="h-5 w-5"></i>
              <i
                data-lucide="chevron-down"
                class="h-3.5 w-3.5 account-dropdown__chevron"
              ></i>
            </span>
            <span class="text-xs hidden md:inline">حسابي</span>
          </button>
          <div class="account-dropdown__menu">
            <!-- User email -->
            <div class="account-dropdown__email">
              <i data-lucide="mail"></i>
              <span>{{ $root.currentUser.email }}</span>
            </div>
            <div class="account-dropdown__divider"></div>
            <!-- Profile / Orders -->
            <a href="#!/orders" class="account-dropdown__item">
              <i data-lucide="package"></i>
              <span>طلباتي</span>
            </a>
            <div class="account-dropdown__divider"></div>
            <!-- Logout -->
            <button
              ng-click="$root.logout()"
              class="account-dropdown__item account-dropdown__item--danger"
            >
              <i data-lucide="log-out"></i>
              <span>تسجيل الخروج</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Category Navigation Bar -->
  <nav class="border-t border-gray-50 bg-white/95 backdrop-blur-sm">
    <div class="uk-container">
      <ul
        class="flex items-center justify-center gap-0 overflow-x-auto scrollbar-hide py-0"
      >
        <li ng-repeat="cat in $root.navCategories" class="shrink-0">
          <a
            ng-href="#!/shop?type={{ cat.value }}"
            class="block px-4 py-2.5 text-sm font-medium text-gray-600 hover:text-primary border-b-2 border-transparent hover:border-accent transition-all whitespace-nowrap no-underline"
            >{{ cat.label }}</a
          >
        </li>
      </ul>
    </div>
  </nav>
</header>
