<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/logos/logo.svg" type="image/svg+xml" />
    <title>Medfinder - صيدليتك اونلاين</title>
    <meta
      name="description"
      content="Medfinder -- متجر إلكتروني متخصص في المنتجات الصيدلانية. أدوية، فيتامينات، مستحضرات تجميل والمزيد."
    />

    <!-- Cairo Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Franken UI CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/franken-ui@2.0.0/dist/css/core.min.css"
    />

    <!-- Tailwind Play CDN -->
    <script>
      /* Suppress Tailwind CDN dev-mode warning */
      const _tw_warn = console.warn;
      console.warn = (...args) => {
        if (
          typeof args[0] === "string" &&
          args[0].includes("cdn.tailwindcss.com")
        )
          return;
        _tw_warn.apply(console, args);
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              cairo: ["Cairo", "sans-serif"],
            },
            colors: {
              border: "hsl(var(--border))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "#0583f2",
                foreground: "#ffffff",
              },
              accent: {
                DEFAULT: "#f99d1c",
                foreground: "#ffffff",
              },
              muted: "hsl(var(--muted))",
              "muted-foreground": "hsl(var(--muted-foreground))",
              card: "hsl(var(--card))",
              dark: "#1f1f1f",
              "page-bg": "#fdfdff",
              "card-bg": "#f5f5f5",
            },
          },
        },
      };
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages/home.css" />
    <link rel="stylesheet" href="css/pages/about.css" />
    <link rel="stylesheet" href="css/pages/shop.css" />
    <link rel="stylesheet" href="css/pages/login.css" />
    <link rel="stylesheet" href="css/pages/cart.css" />
    <link rel="stylesheet" href="css/pages/product.css" />
    <link rel="stylesheet" href="css/pages/orders.css" />
    <link rel="stylesheet" href="css/pages/not-found.css" />
    <link rel="stylesheet" href="css/pages/admin.css" />
    <link rel="stylesheet" href="css/components/chatbot.css" />

    <!-- Franken UI Theme init -->
    <script>
      document.documentElement.classList.add(
        "uk-theme-zinc",
        "uk-radii-md",
        "uk-shadows-sm",
        "uk-font-sm",
      );
    </script>
  </head>

  <body
    class="font-cairo bg-page-bg text-foreground min-h-screen flex flex-col"
    ng-app="medfinderApp"
  >
    <!-- Navbar (shared partial) -->
    <div
      ng-include="'views/partials/navbar.html'"
      class="app-shell__navbar"
    ></div>

    <!-- Main SPA content -->
    <main class="app-shell__main">
      <div class="app-shell__view-stage">
        <div ng-view class="app-shell__view"></div>
        <div class="app-shell__transition-veil" aria-hidden="true"></div>
      </div>
    </main>

    <!-- Footer (shared partial) -->
    <div
      ng-include="'views/partials/footer.html'"
      class="app-shell__footer"
    ></div>

    <!-- Floating Chat Widget -->
    <chat-widget></chat-widget>

    <!-- Franken UI JS -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/franken-ui@2.0.0/dist/js/core.iife.js"
    ></script>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

    <!-- App Module (must load first) -->
    <script src="js/app.js"></script>

    <!-- Config -->
    <script src="js/config/constants.js"></script>
    <script src="js/config/interceptors.js"></script>
    <script src="js/config/routes.js"></script>

    <!-- Services -->
    <script src="js/services/api.service.js"></script>
    <script src="js/services/auth.service.js"></script>
    <script src="js/services/cart.service.js"></script>
    <script src="js/services/product.service.js"></script>
    <script src="js/services/order.service.js"></script>
    <script src="js/services/user.service.js"></script>
    <script src="js/services/admin.service.js"></script>
    <script src="js/services/wishlist.service.js"></script>
    <script src="js/services/chatbot.service.js"></script>

    <!-- Filters -->
    <script src="js/filters/currency.filter.js"></script>
    <script src="js/filters/truncate.filter.js"></script>

    <!-- Directives -->
    <script src="js/directives/productCard.directive.js"></script>
    <script src="js/directives/quantityStepper.directive.js"></script>
    <script src="js/directives/confirmModal.directive.js"></script>
    <script src="js/directives/chat-widget.directive.js"></script>

    <!-- Controllers -->
    <script src="js/controllers/home.controller.js"></script>
    <script src="js/controllers/shop.controller.js"></script>
    <script src="js/controllers/product.controller.js"></script>
    <script src="js/controllers/login.controller.js"></script>
    <script src="js/controllers/cart.controller.js"></script>
    <script src="js/controllers/wishlist.controller.js"></script>
    <script src="js/controllers/orders.controller.js"></script>
    <script src="js/controllers/about.controller.js"></script>
    <script src="js/controllers/admin/dashboard.controller.js"></script>
    <script src="js/controllers/admin/products.controller.js"></script>
    <script src="js/controllers/admin/product-form.controller.js"></script>
    <script src="js/controllers/admin/orders.controller.js"></script>
    <script src="js/controllers/admin/customers.controller.js"></script>

    <!-- Init Lucide icons after Angular view loads -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (typeof lucide !== "undefined") lucide.createIcons();
      });
    </script>
  </body>
</html>
